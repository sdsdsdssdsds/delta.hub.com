<script>

function showForm(id){

    document.querySelectorAll(".wrapper").forEach(form=>{
        form.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
}

function showLogin(){
    showForm("loginForm");
}

function showReset(){
    showForm("resetForm");
}

</script>

 function showWelcome(){

<script>function showLoading(){

    showForm("loadingForm");

    let text = document.getElementById("loadingText");
    let count = 0;

    let anim = setInterval(()=>{
        count++;

        if(count % 4 == 0) text.innerHTML="Opening Delta.com";
        else if(count % 4 == 1) text.innerHTML="Opening Delta.com.";
        else if(count % 4 == 2) text.innerHTML="Opening Delta.com..";
        else text.innerHTML="Opening Delta.com...";
    },500);

    setTimeout(()=>{
        clearInterval(anim);
        showForm("registerForm");
    },3000);
}</script>


<script>
function playHackSound() {
    let audio = document.getElementById("hackSound");

    audio.currentTime = 0;

    audio.play().catch(err => {
        console.log("Audio blocked:", err);
    });
}


</script>

    function showWelcome() {
    playHackSound();
